<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="sportsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF4B2B"/>
    </linearGradient>
    <linearGradient id="sportsShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Tennis Racket (3D Isometric) -->
  <g transform="translate(40, 20) rotate(15)">
    <!-- Handle -->
    <rect x="40" y="150" width="16" height="70" rx="5" fill="#DC2626"/>
    <rect x="42" y="155" width="12" height="60" rx="3" fill="#EF4444"/>
    <!-- Handle grip lines -->
    <line x1="42" y1="165" x2="54" y2="165" stroke="#B91C1C" stroke-width="1" opacity="0.4"/>
    <line x1="42" y1="175" x2="54" y2="175" stroke="#B91C1C" stroke-width="1" opacity="0.4"/>
    <line x1="42" y1="185" x2="54" y2="185" stroke="#B91C1C" stroke-width="1" opacity="0.4"/>
    <line x1="42" y1="195" x2="54" y2="195" stroke="#B91C1C" stroke-width="1" opacity="0.4"/>
    <!-- Throat -->
    <path d="M40 150 L32 130 L64 130 L56 150 Z" fill="#F87171"/>
    <!-- Head frame -->
    <ellipse cx="48" cy="75" rx="38" ry="58" fill="none" stroke="#EF4444" stroke-width="6"/>
    <ellipse cx="48" cy="75" rx="38" ry="58" fill="#FECACA" opacity="0.15"/>
    <!-- Strings vertical -->
    <line x1="30" y1="35" x2="30" y2="115" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <line x1="38" y1="25" x2="38" y2="125" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <line x1="48" y1="20" x2="48" y2="130" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <line x1="58" y1="25" x2="58" y2="125" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <line x1="66" y1="35" x2="66" y2="115" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <!-- Strings horizontal -->
    <line x1="14" y1="50" x2="82" y2="50" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="65" x2="84" y2="65" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="80" x2="84" y2="80" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <line x1="14" y1="95" x2="82" y2="95" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
    <line x1="18" y1="110" x2="78" y2="110" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Basketball (3D Isometric) -->
  <g transform="translate(220, 80)">
    <!-- Ball -->
    <circle cx="60" cy="60" r="50" fill="#FF6B3D"/>
    <circle cx="60" cy="60" r="50" fill="url(#sportsShine)"/>
    <!-- Seam lines -->
    <path d="M10 60 Q35 40 60 60 Q85 80 110 60" stroke="#B91C1C" stroke-width="2" fill="none" opacity="0.4"/>
    <line x1="60" y1="10" x2="60" y2="110" stroke="#B91C1C" stroke-width="2" opacity="0.4"/>
    <path d="M25 25 Q60 45 95 25" stroke="#B91C1C" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M25 95 Q60 75 95 95" stroke="#B91C1C" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- Highlight -->
    <circle cx="45" cy="40" r="15" fill="white" opacity="0.15"/>
  </g>

  <!-- Lightning Bolt -->
  <g transform="translate(180, 10)">
    <path d="M25 0 L10 30 L20 30 L8 55 L35 22 L25 22 L38 0 Z" fill="#FBBF24"/>
    <path d="M25 0 L10 30 L20 30 L8 55 L20 35 L15 35 L25 10 Z" fill="#FCD34D" opacity="0.6"/>
  </g>

  <!-- Lightning Bolt 2 -->
  <g transform="translate(330, 130)">
    <path d="M20 0 L8 24 L16 24 L6 44 L28 18 L20 18 L30 0 Z" fill="#FBBF24"/>
  </g>

  <!-- Dumbbell (3D Isometric) -->
  <g transform="translate(130, 200)">
    <!-- Bar -->
    <rect x="40" y="28" width="100" height="8" rx="4" fill="#9CA3AF"/>
    <rect x="40" y="25" width="100" height="8" rx="4" fill="#D1D5DB"/>
    <!-- Left weight plates -->
    <rect x="20" y="10" width="20" height="44" rx="5" fill="#EF4444"/>
    <rect x="22" y="8" width="18" height="44" rx="4" fill="#F87171"/>
    <rect x="5" y="14" width="18" height="36" rx="5" fill="#DC2626"/>
    <rect x="7" y="12" width="16" height="36" rx="4" fill="#EF4444"/>
    <!-- Right weight plates -->
    <rect x="140" y="10" width="20" height="44" rx="5" fill="#EF4444"/>
    <rect x="142" y="8" width="18" height="44" rx="4" fill="#F87171"/>
    <rect x="157" y="14" width="18" height="36" rx="5" fill="#DC2626"/>
    <rect x="159" y="12" width="16" height="36" rx="4" fill="#EF4444"/>
    <!-- Bar shine -->
    <rect x="45" y="26" width="90" height="2" rx="1" fill="white" opacity="0.3"/>
  </g>
</svg>
