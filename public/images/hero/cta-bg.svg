<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="ctaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" fill="url(#ctaBg)"/>

  <!-- Decorative circles -->
  <circle cx="700" cy="50" r="120" fill="#D4FF00" opacity="0.04"/>
  <circle cx="100" cy="250" r="90" fill="#06B6D4" opacity="0.06"/>
  <circle cx="650" cy="250" r="60" fill="#8B5CF6" opacity="0.05"/>

  <!-- Bell notification icon -->
  <g transform="translate(600, 80)">
    <path d="M30 10 Q30 0 40 0 Q50 0 50 10 L55 35 Q55 42 48 42 L32 42 Q25 42 25 35 Z" fill="#D4FF00" opacity="0.7"/>
    <circle cx="40" cy="46" r="5" fill="#D4FF00" opacity="0.6"/>
    <!-- Sound waves -->
    <path d="M60 15 Q68 20 60 28" stroke="#D4FF00" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M65 10 Q76 20 65 32" stroke="#D4FF00" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M20 15 Q12 20 20 28" stroke="#D4FF00" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M15 10 Q4 20 15 32" stroke="#D4FF00" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Video frame icons -->
  <g transform="translate(650, 180)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#FFFFFF" opacity="0.08"/>
    <circle cx="30" cy="20" r="8" fill="#D4FF00" opacity="0.5"/>
    <polygon points="27,15 27,25 35,20" fill="#1A1A2E" opacity="0.8"/>
  </g>

  <!-- Floating dots -->
  <circle cx="200" cy="40" r="3" fill="#D4FF00" opacity="0.2"/>
  <circle cx="350" cy="260" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="500" cy="30" r="2.5" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="150" cy="180" r="3" fill="#8B5CF6" opacity="0.15"/>
</svg>
