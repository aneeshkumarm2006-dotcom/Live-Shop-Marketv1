<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Video frame outline -->
  <rect x="10" y="10" width="280" height="180" rx="20" fill="url(#frameGrad)" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Inner screen area -->
  <rect x="20" y="20" width="260" height="160" rx="14" fill="#0F172A" opacity="0.6"/>

  <!-- Play button -->
  <circle cx="150" cy="100" r="30" fill="#D4FF00" opacity="0.9"/>
  <polygon points="140,85 140,115 168,100" fill="#1A1A2E"/>

  <!-- Live indicator -->
  <rect x="30" y="30" width="50" height="22" rx="11" fill="#FF6B3D"/>
  <circle cx="44" cy="41" r="4" fill="#FFFFFF"/>
  <text x="60" y="46" font-family="Arial" font-size="10" fill="white" font-weight="bold">LIVE</text>

  <!-- Viewer count -->
  <rect x="220" y="30" width="50" height="22" rx="11" fill="#000000" opacity="0.5"/>
  <text x="245" y="46" text-anchor="middle" font-family="Arial" font-size="9" fill="white">1.2K</text>

  <!-- Chat bubbles / reactions -->
  <circle cx="260" cy="140" r="10" fill="#D4FF00" opacity="0.6"/>
  <text x="260" y="144" text-anchor="middle" font-size="10">❤️</text>
  <circle cx="240" cy="125" r="8" fill="#FF6B9D" opacity="0.5"/>
  <circle cx="255" cy="155" r="7" fill="#06B6D4" opacity="0.4"/>

  <!-- Subtle floating elements -->
  <circle cx="50" cy="160" r="3" fill="#D4FF00" opacity="0.3"/>
  <circle cx="80" cy="150" r="2" fill="#FFFFFF" opacity="0.2"/>
</svg>
